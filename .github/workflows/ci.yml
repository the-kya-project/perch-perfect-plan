name: CI

# Required quality gate: lint + typecheck on every PR and push to main.
# Make this a *required status check* in GitHub branch protection so a failing
# run blocks merges (the workflow itself fails the run; branch protection is what
# turns that into a hard gate).
on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: TypeScript
        run: npx tsc --noEmit
